<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LumiCakes Dessert Finder</title>

    <link rel="stylesheet" href="style.css" />

    <style>
      .search-section {
        text-align: center;
        padding: 70px 20px;
        max-width: 1100px;
        margin: auto;
      }

      .search-section h1 {
        font-size: 42px;
        color: #e58aa3;
        margin-bottom: 10px;
      }

      .search-section p {
        color: #666;
        margin-bottom: 30px;
        font-size: 16px;
      }

      .search-box {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .search-box input {
        padding: 14px 20px;
        border-radius: 30px;
        border: none;
        outline: none;
        width: 260px;
        font-size: 15px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      }

      .category-buttons {
        margin-bottom: 30px;
      }

      .category-buttons button {
        margin: 5px;
      }

      #results {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 260px));
        gap: 30px;
        max-width: 1000px;
        margin: 0 auto;
      }

      .dessert-card {
        background: rgba(255, 255, 255, 0.35);
        border-radius: 22px;
        padding: 20px;
        backdrop-filter: blur(14px);
        box-shadow: 0 15px 40px rgba(229, 138, 163, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.4);
        text-align: center;
        transition: transform 0.25s ease;
        overflow: hidden;
      }

      .dessert-card:hover {
        transform: translateY(-8px);
      }

      .dessert-img {
        width: 100%;
        height: 160px;
        overflow: hidden;
        border-radius: 16px;
        margin-bottom: 15px;
      }

      .dessert-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
      }

      .dessert-card:hover img {
        transform: scale(1.08);
      }

      .dessert-card h3 {
        margin-bottom: 6px;
        color: #444;
      }

      .price {
        font-weight: 600;
        color: #e58aa3;
        margin-bottom: 12px;
      }
    </style>
  </head>

  <body class="futuristic-bg">
    <header class="glass-header">
      <div class="logo">LumiCakes 🍰</div>

      <nav class="glass-nav">
        <a class="nav-btn" href="index.html">Home</a>
        <a class="nav-btn" href="#">Menu</a>
        <a class="nav-btn danger" href="#">Logout</a>
        <a class="nav-btn" href="saved.html">View Saved Items</a>
      </nav>
    </header>

    <section class="search-section">
      <h1>Dessert Finder</h1>
      <p>Discover sweet treats from LumiCakes</p>

      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Search for desserts..."
        />
        <button class="futuristic-btn" onclick="searchDessert()">Search</button>
      </div>

      <!-- CATEGORY BUTTONS -->
      <div class="category-buttons">
        <button class="futuristic-btn" onclick="filterCategory('cake')">
          Cakes
        </button>
        <button class="futuristic-btn" onclick="filterCategory('cupcake')">
          Cupcakes
        </button>
        <button class="futuristic-btn" onclick="filterCategory('cookie')">
          Cookies
        </button>
        <button class="futuristic-btn" onclick="filterCategory('pie')">
          Pies
        </button>
        <button class="futuristic-btn" onclick="filterCategory('brownie')">
          Brownies
        </button>
      </div>

      <div id="results"></div>
    </section>

    <script>
      let allDesserts = [];

      fetch("https://www.themealdb.com/api/json/v1/1/filter.php?c=Dessert")
        .then((res) => res.json())
        .then((data) => {
          allDesserts = data.meals;
          displayDesserts(allDesserts);
        });

      function displayDesserts(list) {
        const results = document.getElementById("results");
        results.innerHTML = "";

        list.forEach((meal) => {
          fetch(
            `https://www.themealdb.com/api/json/v1/1/lookup.php?i=${meal.idMeal}`,
          )
            .then((res) => res.json())
            .then((detailData) => {
              const detail = detailData.meals[0];

              const price = (Math.random() * 8 + 4).toFixed(2);

              // CLEAN DESCRIPTION (NO INSTRUCTIONS)
              const description = `${detail.strMeal} is a ${detail.strCategory.toLowerCase()} dessert from ${detail.strArea}.`;

              results.innerHTML += `
          <div class="dessert-card">
            <div class="dessert-img">
              <img src="${detail.strMealThumb}">
            </div>

            <h3>${detail.strMeal}</h3>

            <p style="font-size:13px;color:#666;margin-bottom:8px;">
              ${description}
            </p>

            <p class="price">$${price}</p>

            <button class="futuristic-btn">Order Now</button>

            <button class="futuristic-btn"
              onclick="saveItem('${detail.idMeal}', '${detail.strMeal}', '${detail.strMealThumb}')">
              Save
            </button>
          </div>
          `;
            });
        });
      }

      function searchDessert() {
        const query = document
          .getElementById("searchInput")
          .value.toLowerCase();

        const filtered = allDesserts.filter((meal) =>
          meal.strMeal.toLowerCase().includes(query),
        );

        displayDesserts(filtered);
      }

      function filterCategory(category) {
        const filtered = allDesserts.filter((meal) =>
          meal.strMeal.toLowerCase().includes(category),
        );

        displayDesserts(filtered);
      }

      function saveItem(id, name, image) {
        let saved = localStorage.getItem("savedDesserts");
        saved = saved ? JSON.parse(saved) : [];

        const exists = saved.some((item) => item.id === id);

        if (exists) {
          alert("Already saved!");
          return;
        }

        saved.push({ id, name, image });

        localStorage.setItem("savedDesserts", JSON.stringify(saved));
        alert("Saved successfully!");
      }
    </script>
    <div id="dessertModal" class="modal" style="display: none">
      <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">×</span>
        <img
          id="modalImg"
          style="width: 100%; border-radius: 12px; margin-bottom: 10px"
        />
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>
        <p id="modalPrice" class="price"></p>
      </div>
    </div>
  </body>
</html>
