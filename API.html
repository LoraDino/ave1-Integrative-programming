<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>LumiCakes Dessert Finder</title>

    <link rel="stylesheet" href="style.css" />

    <style>
      /* PAGE SECTION */

      .search-section {
        text-align: center;
        padding: 70px 20px;
        max-width: 1100px;
        margin: auto;
      }

      .search-section h1 {
        font-size: 42px;
        color: #e58aa3;
        margin-bottom: 10px;
      }

      .search-section p {
        color: #666;
        margin-bottom: 30px;
        font-size: 16px;
      }

      /* SEARCH BAR */

      .search-box {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 40px;
      }

      .search-box input {
        padding: 14px 20px;
        border-radius: 30px;
        border: none;
        outline: none;
        width: 260px;
        font-size: 15px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      }

      /* RESULTS GRID */

      #results {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 260px));
        gap: 30px;
        max-width: 1000px;
        margin: 0 auto;
      }

      /* DESSERT CARD */

      .dessert-card {
        background: rgba(255, 255, 255, 0.35);
        border-radius: 22px;
        padding: 20px;
        backdrop-filter: blur(14px);
        box-shadow: 0 15px 40px rgba(229, 138, 163, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.4);
        text-align: center;
        transition: transform 0.25s ease;
        overflow: hidden;
      }

      .dessert-card:hover {
        transform: translateY(-8px);
      }

      /* IMAGE */

      .dessert-img {
        width: 100%;
        height: 160px;
        overflow: hidden;
        border-radius: 16px;
        margin-bottom: 15px;
      }

      .dessert-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
      }

      .dessert-card:hover img {
        transform: scale(1.08);
      }

      /* TEXT */

      .dessert-card h3 {
        margin-bottom: 6px;
        color: #444;
      }

      .price {
        font-weight: 600;
        color: #e58aa3;
        margin-bottom: 12px;
      }
    </style>
  </head>

  <body class="futuristic-bg">
    <header class="glass-header">
      <div class="logo">LumiCakes 🍰</div>

      <nav class="glass-nav">
        <a class="nav-btn" href="index.html">Home</a>
        <a class="nav-btn" href="#">Menu</a>
        <a class="nav-btn danger" href="#">Logout</a>
      </nav>
    </header>

    <section class="search-section">
      <h1>Dessert Finder</h1>
      <p>Discover sweet treats from LumiCakes</p>

      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Search cake, brownie, cookie..."
        />

        <button class="futuristic-btn" onclick="searchDessert()">Search</button>
      </div>

      <div id="results"></div>
    </section>

    <script>
      function searchDessert() {
        const query = document.getElementById("searchInput").value;
        const results = document.getElementById("results");

        if (query === "") {
          results.innerHTML = "<p>Please enter a dessert name.</p>";
          return;
        }

        fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`)
          .then((response) => response.json())

          .then((data) => {
            results.innerHTML = "";

            if (!data.meals) {
              results.innerHTML = "<p>No desserts found.</p>";
              return;
            }

            data.meals.forEach((meal) => {
              const price = (Math.random() * 8 + 4).toFixed(2);

              results.innerHTML += `
<div class="dessert-card">

<div class="dessert-img">
<img src="${meal.strMealThumb}">
</div>

<h3>${meal.strMeal}</h3>

<p class="price">$${price}</p>

<button class="futuristic-btn">Order Now</button>

</div>
`;
            });
          })

          .catch((error) => {
            results.innerHTML = "<p>Failed to load desserts.</p>";
          });
      }
    </script>
  </body>
</html>
