<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add User | LumiCakes</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at 15% 20%,
            rgba(255, 182, 201, 0.35),
            transparent 40%
          ),
          radial-gradient(
            circle at 85% 80%,
            rgba(229, 138, 163, 0.35),
            transparent 45%
          ),
          linear-gradient(135deg, #fff1f6, #fde2ea);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.25);
        border-radius: 20px;
        padding: 40px 50px;
        backdrop-filter: blur(16px);
        box-shadow: 0 15px 40px rgba(229, 138, 163, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.4);
        max-width: 450px;
        width: 90%;
        text-align: center;
      }

      h1 {
        font-size: 32px;
        color: #e58aa3;
        margin-bottom: 25px;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      input,
      select {
        padding: 14px 18px;
        border-radius: 30px;
        border: none;
        outline: none;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.8);
      }

      button {
        margin-top: 10px;
        background: linear-gradient(135deg, #e58aa3, #ffb6c9);
        color: white;
        border-radius: 30px;
        padding: 12px 0;
        font-weight: 600;
        border: none;
        cursor: pointer;
        transition: all 0.25s ease;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(229, 138, 163, 0.5);
      }

      #message {
        margin-top: 15px;
        font-weight: 500;
        color: #555;
      }
    </style>
  </head>

  <body>
    <a
      href="manageUser.html"
      class="nav-btn"
      style="position: absolute; top: 20px; left: 20px"
      >← Back</a
    >

    <div class="glass-card">
      <h1>Add User</h1>

      <form id="userForm">
        <input type="text" id="name" placeholder="Name" required />
        <input type="email" id="email" placeholder="Email" required />
        <select id="role">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>

        <button type="submit">Add User</button>
      </form>

      <p id="message"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
