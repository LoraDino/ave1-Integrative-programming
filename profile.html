<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | LumiCakes</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="futuristic-bg">
    <!-- TOP DASHBOARD BAR -->
    <header class="glass-header">
      <div class="logo">LumiCakes ✨</div>
      <nav class="glass-nav">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="login.html" class="nav-btn danger">Logout</a>
      </nav>
    </header>

    <!-- DASHBOARD GRID -->
    <main class="dashboard-grid">
      <!-- PROFILE CARD -->
      <section class="glass-card profile-glow">
        <img src="profile.jpg" alt="User Avatar" class="avatar" />
        <h2>Ave Lorie Anne</h2>
        <p class="muted">Premium Member</p>

        <div class="profile-info">
          <p><strong>Email</strong><br />ave@lumicakes.dev</p>
          <p><strong>Address</strong><br />123 Sweet Street, Cake City</p>
        </div>
      </section>

      <!-- BIO / INFO -->
      <section class="glass-card wide">
        <h3>About Me</h3>
        <p>
          I believe desserts should feel magical ✨ LumiCakes is where elegance
          meets sweetness, and every slice tells a story.
        </p>
      </section>

      <!-- ACTIONS -->
      <section class="glass-card action-card">
        <h3>Account Control</h3>
        <a href="settings.html" class="cta futuristic-btn"> Open Settings → </a>
      </section>
    </main>
  </body>
</html>
