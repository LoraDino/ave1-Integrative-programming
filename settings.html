<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings | LumiCakes</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="futuristic-bg">
    <!-- HEADER -->
    <header class="glass-header">
      <div class="logo">Settings</div>
      <nav class="glass-nav">
        <a href="profile.html" class="nav-btn">← Back to Profile</a>
      </nav>
    </header>

    <!-- SETTINGS PANEL -->
    <main class="settings-panel">
      <section class="glass-card">
        <h2>Account Preferences</h2>

        <form class="futuristic-form">
          <label>
            Change Email
            <input type="email" placeholder="new@email.com" />
          </label>

          <label>
            Change Address
            <input type="text" placeholder="New delivery address" />
          </label>

          <label>
            Change Password
            <input type="password" placeholder="••••••••" />
          </label>

          <label>
            Theme Mode
            <select>
              <option>Rose Light</option>
              <option>Midnight Dark</option>
              <option>Neon Pink</option>
            </select>
          </label>

          <button type="button" class="cta futuristic-btn">Save Changes</button>
        </form>
      </section>
    </main>
  </body>
</html>
